<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityCountryHebrew | Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --brand: #4CAF50;
            --brand-light: #66BB6A;
            --brand-dark: #388E3C;
            --dark-bg: #121212;
            --darker-bg: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.7);
            --card-border: rgba(76, 175, 80, 0.2);
            --text: #f0f0f0;
            --text-secondary: #b0b0b0;
            --error: #f44336;
        }

        body {
            background: linear-gradient(135deg, var(--darker-bg) 0%, #1a1a2e 50%, var(--dark-bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--brand);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand);
            letter-spacing: 1px;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--card-border);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: var(--brand);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--brand);
            border-radius: 3px 3px 0 0;
        }

        .form-container {
            position: relative;
            overflow: hidden;
        }

        .form {
            display: none;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.5s ease;
        }

        .form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .forgot-link {
            align-self: flex-end;
            color: var(--brand-light);
            text-decoration: none;
            font-size: 14px;
            margin-top: -5px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .submit-btn {
            background: linear-gradient(to right, var(--brand), var(--brand-dark));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 15px rgba(76, 175, 80, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 15px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .google-btn i {
            color: #DB4437;
            font-size: 18px;
        }

        .error-message {
            color: var(--error);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 25px;
            }
            .tab {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            <div class="logo">CityCountryHebrew</div>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <div class="tab active" data-tab="signin">Sign In</div>
                <div class="tab" data-tab="signup">Sign Up</div>
            </div>

            <div class="form-container">
                <!-- Sign In Form -->
                <form id="signin-form" class="form active">
                    <div class="input-group">
                        <label for="signin-email">Email</label>
                        <input type="email" id="signin-email" placeholder="your@email.com" required>
                        <div class="error-message" id="signin-email-error"></div>
                    </div>
                    <div class="input-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" placeholder="••••••••" required>
                        <div class="error-message" id="signin-password-error"></div>
                    </div>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <!-- Sign Up Form -->
                <form id="signup-form" class="form">
                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                        <div class="error-message" id="signup-name-error"></div>
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="your@email.com" required>
                        <div class="error-message" id="signup-email-error"></div>
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                        <div class="error-message" id="signup-password-error"></div>
                    </div>
                    <div class="input-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="••••••••" required>
                        <div class="error-message" id="signup-confirm-error"></div>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <button class="google-btn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>

            <div class="footer">
                By continuing, you agree to our Terms & Privacy Policy
            </div>
        </div>
    </div>

    <script>
        // Tab Switching
        const tabs = document.querySelectorAll('.tab');
        const forms = document.querySelectorAll('.form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.getAttribute('data-tab');
                
                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // Show corresponding form
                forms.forEach(form => {
                    form.classList.remove('active');
                    if (form.id === `${targetTab}-form`) {
                        form.classList.add('active');
                    }
                });
            });
        });

        // Form Validation & Submission
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError(elementId) {
            const errorEl = document.getElementById(elementId);
            errorEl.style.display = 'none';
        }

        // Mock Sign In
        signinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signin-email').value.trim();
            const password = document.getElementById('signin-password').value.trim();
            
            // Hide previous errors
            hideError('signin-email-error');
            hideError('signin-password-error');
            
            let valid = true;
            
            if (!email) {
                showError('signin-email-error', 'Email is required');
                valid = false;
            } else if (!/\S+@\S+\.\S+/.test(email)) {
                showError('signin-email-error', 'Email is invalid');
                valid = false;
            }
            
            if (!password) {
                showError('signin-password-error', 'Password is required');
                valid = false;
            } else if (password.length < 6) {
                showError('signin-password-error', 'Password must be at least 6 characters');
                valid = false;
            }
            
            if (valid) {
                // Mock authentication
                localStorage.setItem('authToken', 'mock-token-xxx');
                
                // Show loading state
                const submitBtn = signinForm.querySelector('.submit-btn');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Signing In...';
                submitBtn.disabled = true;
                
                // Simulate API call delay
                setTimeout(() => {
                    window.location.href = 'app.html';
                }, 800);
            }
        });

        // Mock Sign Up
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();
            const confirm = document.getElementById('signup-confirm').value.trim();
            
            // Hide previous errors
            hideError('signup-name-error');
            hideError('signup-email-error');
            hideError('signup-password-error');
            hideError('signup-confirm-error');
            
            let valid = true;
            
            if (!name) {
                showError('signup-name-error', 'Full name is required');
                valid = false;
            }
            
            if (!email) {
                showError('signup-email-error', 'Email is required');
                valid = false;
            } else if (!/\S+@\S+\.\S+/.test(email)) {
                showError('signup-email-error', 'Email is invalid');
                valid = false;
            }
            
            if (!password) {
                showError('signup-password-error', 'Password is required');
                valid = false;
            } else if (password.length < 8) {
                showError('signup-password-error', 'Password must be at least 8 characters');
                valid = false;
            }
            
            if (!confirm) {
                showError('signup-confirm-error', 'Please confirm your password');
                valid = false;
            } else if (password !== confirm) {
                showError('signup-confirm-error', 'Passwords do not match');
                valid = false;
            }
            
            if (valid) {
                // Mock registration
                localStorage.setItem('authToken', 'mock-token-xxx');
                
                // Show loading state
                const submitBtn = signupForm.querySelector('.submit-btn');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Creating Account...';
                submitBtn.disabled = true;
                
                // Simulate API call delay
                setTimeout(() => {
                    window.location.href = 'app.html';
                }, 800);
            }
        });

        // Google button (visual only)
        document.querySelector('.google-btn').addEventListener('click', () => {
            alert('Google authentication would be implemented in a real application.');
        });

        // Forgot password link
        document.querySelector('.forgot-link').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Password reset functionality would be implemented in a real application.');
        });

        // Real-time validation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const errorId = input.id + '-error';
                hideError(errorId);
            });
        });
    </script>
</body>
</html>
